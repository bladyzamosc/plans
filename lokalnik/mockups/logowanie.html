<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie | Lokalnik.pl</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html" class="back-to-index">← Mockupy</a>

    <div class="phone">
        <div class="content content-center">
            <!-- Logo -->
            <div style="margin-bottom: 32px;">
                <div style="width: 80px; height: 80px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                    <span style="font-size: 36px;">🏠</span>
                </div>
                <div style="font-size: 28px; font-weight: 700; color: var(--primary);">Lokalnik.pl</div>
                <div style="font-size: 15px; color: var(--text-muted); margin-top: 4px;">Panel zarządzania</div>
            </div>

            <!-- Login form -->
            <div style="width: 100%;">
                <div class="input-group">
                    <label class="input-label">Email</label>
                    <input type="email" class="input" placeholder="twoj@email.pl" value="jan@apartamenty-morskie.pl">
                </div>

                <div class="input-group">
                    <label class="input-label">Hasło</label>
                    <input type="password" class="input" placeholder="••••••••" value="haslo123">
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" style="font-size: 14px; color: var(--primary); text-decoration: none;">Zapomniałem hasła</a>
                </div>

                <a href="panel-zarzadca-dashboard.html" class="btn btn-primary">
                    Zaloguj się
                </a>
            </div>

            <!-- Separator -->
            <div style="display: flex; align-items: center; gap: 16px; margin: 32px 0; width: 100%;">
                <div style="flex: 1; height: 1px; background: var(--border);"></div>
                <span style="color: var(--text-muted); font-size: 14px;">lub</span>
                <div style="flex: 1; height: 1px; background: var(--border);"></div>
            </div>

            <!-- Register link -->
            <div style="text-align: center;">
                <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 12px;">
                    Nie masz jeszcze konta?
                </div>
                <a href="rejestracja-zarzadca.html" class="btn btn-outline">
                    Zarejestruj się jako Zarządca
                </a>
            </div>

            <!-- Partner login hint -->
            <div style="margin-top: 32px; padding: 16px; background: var(--bg); border-radius: 12px; width: 100%;">
                <div style="font-size: 13px; color: var(--text-muted); text-align: center;">
                    <strong>Jesteś Partnerem (restauracja, kawiarnia)?</strong><br>
                    <a href="panel-partner-dashboard.html" style="color: var(--primary);">Zaloguj się do Panelu Partnera →</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
