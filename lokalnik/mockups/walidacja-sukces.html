<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zrealizowano! | Lokalnik.pl</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html" class="back-to-index">← Mockupy</a>

    <div class="phone">
        <div class="content content-center" style="background: var(--success-bg);">
            <!-- Success Icon -->
            <div class="icon-circle success" style="width: 100px; height: 100px; font-size: 48px;">
                ✓
            </div>

            <h1 style="font-size: 28px; font-weight: 600; margin-bottom: 8px; color: #15803d;">Zrealizowano!</h1>
            <p style="color: #166534; margin-bottom: 32px;">
                Kod został pomyślnie wykorzystany
            </p>

            <!-- Details -->
            <div style="background: white; border-radius: 16px; padding: 20px; width: 100%; text-align: left;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light);">
                    <span style="color: var(--text-muted);">Kod:</span>
                    <span style="font-family: monospace; font-weight: 600;">LNK-7X2K9</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light);">
                    <span style="color: var(--text-muted);">Zniżka:</span>
                    <span style="font-weight: 500;">-20% na pizze</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light);">
                    <span style="color: var(--text-muted);">Gość z:</span>
                    <span style="font-weight: 500;">Apartament Słoneczny</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-muted);">Data:</span>
                    <span style="font-weight: 500;">20.07.2026, 18:23</span>
                </div>
            </div>

            <!-- Note for staff -->
            <div style="margin-top: 24px; padding: 16px; background: white; border-radius: 12px; width: 100%;">
                <div style="font-size: 14px; color: var(--text-muted);">
                    💡 Możesz zamknąć tę stronę. Realizacja została zapisana w systemie.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
