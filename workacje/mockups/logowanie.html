<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Zaloguj sie - workejszyn.pl</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-start: #1A73E8;
            --gradient-mid: #00ACC1;
            --gradient-end: #00D2A0;
            --accent-blue: #1A73E8;
            --accent-cyan: #00ACC1;
            --accent-teal: #00D2A0;

            --slate-900: #0F172A;
            --slate-800: #1E293B;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-500: #64748B;
            --slate-400: #94A3B8;
            --slate-300: #CBD5E1;
            --slate-200: #E2E8F0;
            --slate-100: #F1F5F9;
            --slate-50: #F8FAFC;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            padding: 1.5rem 2rem;
        }

        .logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
        .logo-icon { width: 42px; height: 42px; }
        .logo-text { font-size: 1.4rem; font-weight: 700; color: var(--white); }
        .logo-text .accent { opacity: 0.8; }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background: var(--white);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--slate-900);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--slate-500);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--slate-700);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--slate-200);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--slate-50);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(0, 172, 193, 0.1);
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-cyan);
        }

        .remember-me span {
            font-size: 0.9rem;
            color: var(--slate-600);
        }

        .forgot-link {
            font-size: 0.9rem;
            color: var(--accent-cyan);
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 16px rgba(0, 172, 193, 0.4);
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.75rem 0;
            color: var(--slate-400);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--slate-200);
        }

        .divider span {
            padding: 0 1rem;
        }

        .auth-switch {
            text-align: center;
            font-size: 0.95rem;
            color: var(--slate-600);
        }

        .auth-switch a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        /* FOOTER */
        footer {
            padding: 1.5rem 2rem;
            text-align: center;
        }

        footer p {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }

        footer a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            header {
                padding: 1rem;
                padding-top: calc(1rem + env(safe-area-inset-top));
            }
            main {
                padding: 1rem;
            }
            .auth-card {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }
            .auth-header h1 {
                font-size: 1.5rem;
            }
            footer {
                padding: 1rem;
                padding-bottom: calc(1rem + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="#" class="logo">
            <svg class="logo-icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="rgba(255,255,255,0.8)"/></linearGradient></defs>
                <g transform="translate(0,10)"><path d="M90,110 L165,390 L215,390 L256,220 L297,390 L347,390 L422,110 L360,110 L322,300 L278,110 L234,110 L190,300 L152,110Z" fill="url(#lg1)"/></g>
            </svg>
            <span class="logo-text">workejszyn<span class="accent">.pl</span></span>
        </a>
    </header>

    <!-- MAIN -->
    <main>
        <div class="auth-card">
            <div class="auth-header">
                <h1>Zaloguj sie</h1>
                <p>Witaj ponownie! Zaloguj sie na swoje konto.</p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" placeholder="jan@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Haslo</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-row">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Zapamietaj mnie</span>
                    </label>
                    <a href="#" class="forgot-link">Zapomniales hasla?</a>
                </div>

                <button type="submit" class="btn-primary">Zaloguj sie</button>
            </form>

            <div class="divider"><span>lub</span></div>

            <p class="auth-switch">
                Nie masz konta? <a href="#">Zarejestruj sie</a>
            </p>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 workejszyn.pl · <a href="#">Regulamin</a> · <a href="#">Prywatnosc</a></p>
    </footer>

</body>
</html>
