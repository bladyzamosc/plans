                  type: string
                  format: uri
      responses:
        '201':
          description: Wniosek złożony
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueChangeRequest'
        '403':
          description: Tylko OWNER może zmieniać nazwę/logo

  /owner/venues/{venueId}/change-requests:
    get:
      tags: [Owner]
      summary: Historia wniosków o zmianę
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista wniosków
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VenueChangeRequest'

  /owner/venues/{venueId}/logo:
    post:
      tags: [Owner]
      summary: Upload nowego logo (tylko OWNER)
      description: Zwraca URL, który trzeba przekazać do change-request
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Logo uploadowane (oczekuje na akceptację)
          content:
            application/json:
              schema:
                type: object
                properties:
                  pendingLogoUrl:
                    type: string
                    format: uri
        '403':
          description: Tylko OWNER może zmieniać logo

  /owner/venues/{venueId}/pin:
    patch:
      tags: [Owner]
      summary: Zmień PIN walidacji (tylko OWNER)
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPin]
              properties:
                newPin:
                  type: string
                  minLength: 4
                  maxLength: 4
      responses:
        '200':
          description: PIN zmieniony
        '403':
          description: Tylko OWNER może zmieniać PIN

  /owner/venues/{venueId}/terminate:
    post:
      tags: [Owner]
      summary: Wypowiedzenie umowy (tylko OWNER)
      description: |
        Rozpoczyna 30-dniowy okres wypowiedzenia.
        W tym czasie oferty działają, ale nie można tworzyć nowych.
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Opcjonalny powód wypowiedzenia
      responses:
        '200':
          description: Wypowiedzenie przyjęte
          content:
            application/json:
              schema:
                type: object
                properties:
                  terminationRequestedAt:
                    type: string
                    format: date-time
                  terminationEffectiveAt:
                    type: string
                    format: date-time
                    description: Data zakończenia (za 30 dni)
        '403':
          description: Tylko OWNER może wypowiedzieć umowę

  /owner/venues/{venueId}/stats:
    get:
      tags: [Owner]
      summary: Statystyki lokalu
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Statystyki
