      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista lokali
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VenueOwnerListItem'

  /owner/venues/{venueId}:
    get:
      tags: [Owner]
      summary: Szczegóły lokalu
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lokal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueOwnerView'
        '403':
