openapi: 3.0.3
info:
  title: Swoi API
  description: |
    API dla aplikacji Swoi - lokalne rabaty i wspieranie sąsiedzkiego biznesu.

    ## Autoryzacja
    - JWT Bearer token w headerze `Authorization: Bearer <token>`
    - Access token ważny 15 minut
    - Refresh token ważny 30 dni

    ## Role
    - `CLIENT` - zwykły użytkownik aplikacji
    - `VENUE_USER` - użytkownik przypisany do lokalu (OWNER lub MANAGER)
    - `ADMIN` - administrator systemu

    ## Role w lokalu (VenueUser)
    - `OWNER` - właściciel: pełne uprawnienia (zmiana nazwy/logo, PIN, wypowiedzenie, oferty, managerowie)
    - `MANAGER` - manager: tylko oferty (tworzenie, edycja, pauzowanie, statystyki)
  version: 2.0.0
  contact:
    name: Swoi Team

servers:
  - url: https://api.swoi.app/v1
    description: Production
  - url: https://api.staging.swoi.app/v1
    description: Staging

tags:
  - name: Auth
    description: Autoryzacja i uwierzytelnianie
  - name: Districts
    description: Dzielnice / okolice
  - name: Categories
    description: Kategorie lokali
  - name: Venues
    description: Lokale
  - name: Offers
    description: Oferty / rabaty
  - name: Redemptions
    description: Realizacja rabatów (QR)
  - name: Reviews
    description: Oceny zrealizowanych ofert
  - name: User
    description: Profil użytkownika
  - name: Owner
    description: Panel właściciela/managera lokalu
  - name: Admin
    description: Panel administratora

paths:
  # ==================== AUTH ====================
  /auth/google:
    post:
      tags: [Auth]
      summary: Logowanie przez Google
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken:
                  type: string
                  description: Google ID token
      responses:
        '200':
          description: Zalogowano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/apple:
    post:
      tags: [Auth]
      summary: Logowanie przez Apple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identityToken]
              properties:
                identityToken:
                  type: string
                  description: Apple identity token
      responses:
        '200':
          description: Zalogowano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/magic-link:
    post:
      tags: [Auth]
      summary: Wysłanie magic link na email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Link wysłany
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Link wysłany na email"
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/magic-link/verify:
    post:
      tags: [Auth]
      summary: Weryfikacja magic link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Token z magic link
      responses:
        '200':
          description: Zalogowano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/owner-invitation/accept:
    post:
      tags: [Auth]
      summary: Akceptacja zaproszenia właściciela (ustawienie hasła)
      description: |
        Endpoint dla nowych właścicieli zaproszonych przez admina.
        Token pochodzi z emaila, użytkownik ustawia hasło i akceptuje regulaminy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, ownerData, consents]
              properties:
                token:
                  type: string
                  description: Token z emaila zaproszeniowego
                password:
                  type: string
                  minLength: 8
                  description: Nowe hasło
                ownerData:
                  $ref: '#/components/schemas/OwnerRegistrationData'
                consents:
                  type: object
                  required: [termsAccepted, privacyAccepted]
                  properties:
                    termsAccepted:
                      type: boolean
                    privacyAccepted:
                      type: boolean
                    marketingAccepted:
                      type: boolean
      responses:
        '200':
          description: Konto aktywowane
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Token wygasł lub nieprawidłowy
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/login:
    post:
      tags: [Auth]
      summary: Logowanie hasłem (dla owner/manager)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Zalogowano
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - type: object
                    properties:
                      mustChangePassword:
                        type: boolean
                        description: Czy wymaga zmiany hasła (pierwsze logowanie)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Zmiana hasła
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Hasło zmienione
        '400':
          description: Nieprawidłowe aktualne hasło

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Odświeżenie access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token odświeżony
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Wylogowanie (unieważnienie refresh token)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Wylogowano

  # ==================== REGISTRATION ====================
  /auth/register:
    post:
      tags: [Auth]
      summary: Rejestracja klienta (po OAuth)
      description: |
        Uzupełnienie danych po pierwszym logowaniu OAuth.
        Wymagane: dzielnica + ulica + zgody.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [districtId, street, termsAccepted, privacyAccepted]
              properties:
                districtId:
                  type: string
                  format: uuid
                street:
                  type: string
                  maxLength: 200
                  description: Wymagana ulica zamieszkania
                termsAccepted:
                  type: boolean
                privacyAccepted:
                  type: boolean
                personalizedOffersConsent:
                  type: boolean
                  default: false
                  description: Zgoda na personalizowane oferty
      responses:
        '200':
          description: Rejestracja zakończona
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # ==================== DISTRICTS ====================
  /districts:
    get:
      tags: [Districts]
      summary: Lista dzielnic
      parameters:
        - name: lat
          in: query
          schema:
            type: number
            format: double
          description: Szerokość geograficzna (do sortowania po odległości)
        - name: lng
          in: query
          schema:
            type: number
            format: double
          description: Długość geograficzna
        - name: search
          in: query
          schema:
            type: string
          description: Wyszukiwanie po nazwie
      responses:
        '200':
          description: Lista dzielnic
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/District'

  /districts/{id}:
    get:
      tags: [Districts]
      summary: Szczegóły dzielnicy
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Dzielnica
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/District'
        '404':
          $ref: '#/components/responses/NotFound'

  /districts/{id}/streets:
    get:
      tags: [Districts]
      summary: Lista ulic w dzielnicy (autocomplete)
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: search
          in: query
          schema:
            type: string
          description: Wyszukiwanie po nazwie ulicy
      responses:
        '200':
          description: Lista ulic
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                    example: ["Aleje Jerozolimskie", "Andersa", "Anielewicza"]

  /districts/nearby:
    get:
      tags: [Districts]
      summary: Dzielnice w pobliżu (geolokalizacja)
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radiusKm
          in: query
          schema:
            type: number
            default: 5
      responses:
        '200':
          description: Dzielnice w pobliżu
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/District'
                        - type: object
                          properties:
                            distanceKm:
                              type: number
                              format: double

  # ==================== CATEGORIES ====================
  /categories:
    get:
      tags: [Categories]
      summary: Lista kategorii lokali
      responses:
        '200':
          description: Lista kategorii
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'

  # ==================== VENUES ====================
  /venues:
    get:
      tags: [Venues]
      summary: Lista lokali
      parameters:
        - name: districtId
          in: query
          schema:
            type: string
            format: uuid
          description: Filtr po dzielnicy
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
          description: Filtr po kategorii
        - name: hasActiveOffers
          in: query
          schema:
            type: boolean
          description: Tylko lokale z aktywnymi ofertami
      responses:
        '200':
          description: Lista lokali
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VenueListItem'

  /venues/{id}:
    get:
      tags: [Venues]
      summary: Szczegóły lokalu
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Lokal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Venue'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== OFFERS ====================
  /offers:
    get:
      tags: [Offers]
      summary: Lista ofert
      parameters:
        - name: districtId
          in: query
          schema:
            type: string
            format: uuid
          description: Filtr po dzielnicy
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
          description: Filtr po kategorii lokalu
        - name: venueId
          in: query
          schema:
            type: string
            format: uuid
          description: Filtr po lokalu
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, ending_soon]
            default: newest
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: Lista ofert
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OfferListItem'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /offers/{id}:
    get:
      tags: [Offers]
      summary: Szczegóły oferty
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Oferta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== REDEMPTIONS ====================
  /redemptions:
    get:
      tags: [Redemptions]
      summary: Historia realizacji użytkownika
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, REDEEMED, EXPIRED]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Historia realizacji
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Redemption'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

    post:
      tags: [Redemptions]
      summary: Wygeneruj kod QR dla oferty
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [offerId]
              properties:
                offerId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Kod wygenerowany
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Redemption'
        '400':
          description: Błąd walidacji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                dailyLimit:
                  summary: Limit dzienny
                  value:
                    error: "DAILY_LIMIT_REACHED"
                    message: "Już dziś skorzystałeś z tej oferty"
                offerExpired:
                  summary: Oferta wygasła
                  value:
                    error: "OFFER_EXPIRED"
                    message: "Ta oferta już wygasła"

  /redemptions/{qrCode}:
    get:
      tags: [Redemptions]
      summary: Pobierz dane realizacji (dla pracownika)
      description: |
        Endpoint publiczny - używany po zeskanowaniu QR.

        **Rate limit:** 10 req/min per IP (anti-enumeration)
      parameters:
        - name: qrCode
          in: path
          required: true
          schema:
            type: string
          example: "RDM-A7X2K9"
      responses:
        '200':
          description: Dane realizacji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedemptionValidation'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: QR kod wygasł
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "QR_EXPIRED"
                message: "Kod QR wygasł. Klient może wygenerować nowy w aplikacji."
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /redemptions/{qrCode}/validate:
    post:
      tags: [Redemptions]
      summary: Potwierdź realizację (pracownik wpisuje PIN)
      description: |
        Walidacja PINem lokalu.

        **Komunikat personalizacji:** Po pomyślnej walidacji zwracany jest komunikat
        o zgodzie na personalizowane oferty (do wyświetlenia klientowi).

        **Rate limits:**
        - 5 req/5min per qrCode (anti brute-force)
        - 20 req/min per IP (anti DDoS)

        **Blokada:** Po 3 błędnych PINach kod blokowany na 15 minut.
      parameters:
        - name: qrCode
          in: path
          required: true
          schema:
            type: string
          example: "RDM-A7X2K9"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin:
                  type: string
                  minLength: 4
                  maxLength: 4
                  example: "1234"
      responses:
        '200':
          description: Zrealizowano
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  redeemedAt:
                    type: string
                    format: date-time
                  personalizationNotice:
                    type: string
                    description: Komunikat o personalizacji do wyświetlenia klientowi
                    example: "Realizując ofertę wyrażasz zgodę na otrzymywanie spersonalizowanych ofert."
        '400':
          description: Błąd walidacji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidPin:
                  summary: Błędny PIN
                  value:
                    error: "INVALID_PIN"
                    message: "Nieprawidłowy PIN"
                alreadyRedeemed:
                  summary: Już zrealizowano
                  value:
                    error: "ALREADY_REDEEMED"
                    message: "Ten kod został już wykorzystany"
                qrExpired:
                  summary: QR wygasł
                  value:
                    error: "QR_EXPIRED"
                    message: "Kod QR wygasł. Klient może wygenerować nowy."
                temporarilyBlocked:
                  summary: Tymczasowa blokada
                  value:
                    error: "REDEMPTION_TEMPORARILY_BLOCKED"
                    message: "Zbyt wiele błędnych prób. Kod zablokowany na 15 minut."
        '429':
          $ref: '#/components/responses/TooManyRequests'

  # ==================== REVIEWS ====================
  /redemptions/{redemptionId}/review:
    post:
      tags: [Reviews]
      summary: Dodaj ocenę zrealizowanej oferty
      description: Opcjonalna ocena po realizacji (z historii realizacji)
      security:
        - bearerAuth: []
      parameters:
        - name: redemptionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: Ocena 1-5 gwiazdek
                comment:
                  type: string
                  maxLength: 500
                  description: Opcjonalny komentarz
      responses:
        '201':
          description: Ocena dodana
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferReview'
        '400':
          description: Błąd walidacji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                alreadyReviewed:
                  summary: Już oceniono
                  value:
                    error: "ALREADY_REVIEWED"
                    message: "Ta realizacja została już oceniona"
                notRedeemed:
                  summary: Nie zrealizowano
                  value:
                    error: "NOT_REDEEMED"
                    message: "Można ocenić tylko zrealizowane oferty"
                commentRejected:
                  summary: Komentarz odrzucony
                  value:
                    error: "COMMENT_REJECTED"
                    message: "Komentarz zawiera niedozwolone treści"

  # ==================== USER ====================
  /user/me:
    get:
      tags: [User]
      summary: Profil zalogowanego użytkownika
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    patch:
      tags: [User]
      summary: Aktualizacja profilu
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 100
                street:
                  type: string
                  maxLength: 200
      responses:
        '200':
          description: Zaktualizowano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    delete:
      tags: [User]
      summary: Usunięcie konta (GDPR)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Konto usunięte

  /user/consents:
    get:
      tags: [User]
      summary: Pobierz zgody użytkownika
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Zgody
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserConsents'

    patch:
      tags: [User]
      summary: Aktualizuj zgody (np. wycofaj personalizację)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                personalizedOffersConsent:
                  type: boolean
                marketingConsent:
                  type: boolean
      responses:
        '200':
          description: Zaktualizowano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserConsents'

  /user/districts:
    get:
      tags: [User]
      summary: Subskrybowane dzielnice
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista subskrypcji
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserDistrict'

    post:
      tags: [User]
      summary: Subskrybuj dzielnicę
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [districtId]
              properties:
                districtId:
                  type: string
                  format: uuid
                notificationsEnabled:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Subskrypcja dodana
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDistrict'
        '409':
          description: Już subskrybowano

  /user/districts/{districtId}:
    patch:
      tags: [User]
      summary: Aktualizuj ustawienia subskrypcji
      security:
        - bearerAuth: []
      parameters:
        - name: districtId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationsEnabled:
                  type: boolean
      responses:
        '200':
          description: Zaktualizowano
          content:
            application/json:
              schema:
