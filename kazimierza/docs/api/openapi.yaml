                  type: string
                  format: uuid
      responses:
        '201':
          description: Dodano
        '409':
          description: Już w ulubionych

  /user/favorites/{venueId}:
    delete:
      tags: [User]
      summary: Usuń z ulubionych
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Usunięto

  /user/push-token:
    post:
      tags: [User]
      summary: Rejestracja tokena push
