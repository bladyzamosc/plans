                      $ref: '#/components/schemas/VenueAdmin'

    post:
      tags: [Admin]
      summary: Utwórz lokal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VenueCreate'
      responses:
        '201':
          description: Utworzono
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueAdmin'

  /admin/venues/{id}:
    patch:
      tags: [Admin]
      summary: Aktualizuj lokal
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VenueCreate'
      responses:
        '200':
          description: Zaktualizowano

    delete:
      tags: [Admin]
      summary: Deaktywuj lokal
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Deaktywowano

  /admin/categories:
    get:
      tags: [Admin]
      summary: Lista kategorii (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista kategorii
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CategoryAdmin'

    post:
      tags: [Admin]
      summary: Utwórz kategorię
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: Utworzono

  /admin/categories/{id}:
    patch:
      tags: [Admin]
      summary: Aktualizuj kategorię
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '200':
          description: Zaktualizowano

    delete:
      tags: [Admin]
      summary: Usuń kategorię
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Usunięto
        '400':
          description: Kategoria ma przypisane lokale

  /admin/categories/reorder:
    post:
      tags: [Admin]
      summary: Zmień kolejność kategorii
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Lista ID kategorii w nowej kolejności
      responses:
        '200':
          description: Kolejność zmieniona

  /admin/users:
    get:
      tags: [Admin]
      summary: Lista użytkowników
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Szukaj po nazwie lub email
        - name: role
          in: query
          schema:
            type: string
            enum: [CLIENT, VENUE_USER, ADMIN]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista użytkowników
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserAdmin'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /admin/users/{id}:
    get:
      tags: [Admin]
      summary: Szczegóły użytkownika
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Użytkownik
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAdmin'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Brak autoryzacji
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "UNAUTHORIZED"
            message: "Wymagane zalogowanie"

    NotFound:
      description: Nie znaleziono
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "NOT_FOUND"
            message: "Nie znaleziono zasobu"

    TooManyRequests:
      description: Zbyt wiele żądań
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "TOO_MANY_REQUESTS"
            message: "Poczekaj przed kolejną próbą"

  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Czas ważności access token w sekundach
        user:
          $ref: '#/components/schemas/User'

    OwnerRegistrationData:
      type: object
      required: [fullName, phone, companyName, companyNip, companyAddress]
      properties:
        fullName:
          type: string
          maxLength: 100
          description: Imię i nazwisko osoby kontaktowej
        phone:
          type: string
          maxLength: 20
        companyName:
          type: string
          maxLength: 200
        companyNip:
          type: string
          pattern: '^\d{10}$'
        companyAddress:
          type: string
          maxLength: 300

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          format: uri
        authProvider:
          type: string
          enum: [GOOGLE, APPLE, EMAIL, ADMIN_CREATED]
        role:
          type: string
          enum: [CLIENT, VENUE_USER, ADMIN]
        districtId:
          type: string
          format: uuid
        street:
          type: string
        createdAt:
          type: string
          format: date-time

    UserConsents:
      type: object
      properties:
        termsAccepted:
          type: boolean
        privacyAccepted:
          type: boolean
        personalizedOffersConsent:
          type: boolean
        marketingConsent:
          type: boolean
        consentDate:
          type: string
          format: date-time

    UserAdmin:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            lastActiveAt:
              type: string
              format: date-time
            venuesCount:
              type: integer
              description: Liczba lokali (jako owner lub manager)
            redemptionsCount:
              type: integer

    District:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        centerLat:
          type: number
          format: double
        centerLng:
          type: number
          format: double
        radiusKm:
          type: number
          format: double
        venuesCount:
          type: integer
        activeOffersCount:
          type: integer

    DistrictAdmin:
      allOf:
        - $ref: '#/components/schemas/District'
        - type: object
          properties:
            active:
              type: boolean
            subscribersCount:
              type: integer
            createdAt:
              type: string
              format: date-time

    DistrictCreate:
      type: object
      required: [name, slug, centerLat, centerLng, radiusKm]
      properties:
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
        centerLat:
          type: number
          format: double
        centerLng:
          type: number
          format: double
        radiusKm:
          type: number
          format: double
        active:
          type: boolean
          default: true

    UserDistrict:
      type: object
      properties:
        district:
          $ref: '#/components/schemas/District'
        notificationsEnabled:
          type: boolean
        subscribedAt:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        sortOrder:
          type: integer

    CategoryAdmin:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          properties:
            venuesCount:
              type: integer

    CategoryCreate:
      type: object
      required: [name, slug, icon]
      properties:
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 50
        icon:
          type: string
          maxLength: 50
        sortOrder:
          type: integer
          default: 0

    VenueListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        logoUrl:
          type: string
          format: uri
        category:
          $ref: '#/components/schemas/Category'
        activeOffersCount:
          type: integer
        isFavorite:
          type: boolean
          description: Czy użytkownik ma w ulubionych (null jeśli niezalogowany)

    Venue:
      allOf:
        - $ref: '#/components/schemas/VenueListItem'
        - type: object
          properties:
            address:
              type: string
            description:
              type: string
            district:
              $ref: '#/components/schemas/District'

    VenueOwnerListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        logoUrl:
          type: string
          format: uri
        status:
          type: string
          enum: [ACTIVE, INACTIVE, TERMINATING, TERMINATED]
        role:
          type: string
          enum: [OWNER, MANAGER]
          description: Rola użytkownika w tym lokalu

    VenueOwnerView:
      allOf:
        - $ref: '#/components/schemas/Venue'
        - type: object
          properties:
            status:
              type: string
              enum: [ACTIVE, INACTIVE, TERMINATING, TERMINATED]
            validationPin:
              type: string
              description: PIN do walidacji (widoczny tylko dla OWNER)
            role:
              type: string
              enum: [OWNER, MANAGER]
            terminationRequestedAt:
              type: string
              format: date-time
            terminationEffectiveAt:
              type: string
              format: date-time
            pendingChangeRequest:
              $ref: '#/components/schemas/VenueChangeRequest'

    VenueAdmin:
      allOf:
        - $ref: '#/components/schemas/Venue'
        - type: object
          properties:
            status:
              type: string
              enum: [ACTIVE, INACTIVE, TERMINATING, TERMINATED, DELETED]
            validationPin:
              type: string
            ownersCount:
              type: integer
            managersCount:
              type: integer
            createdAt:
              type: string
              format: date-time
            terminationRequestedAt:
              type: string
              format: date-time
            terminationEffectiveAt:
              type: string
              format: date-time

    VenueCreate:
      type: object
      required: [name, districtId, categoryId, address]
      properties:
        name:
          type: string
          maxLength: 100
        districtId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
        address:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        validationPin:
          type: string
          minLength: 4
          maxLength: 4
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          default: ACTIVE

    VenueManager:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [OWNER, MANAGER]
        invitedAt:
          type: string
          format: date-time
        acceptedAt:
          type: string
          format: date-time
          description: NULL jeśli oczekuje na akceptację

    VenueChangeRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        changeType:
          type: string
          enum: [NAME, LOGO, NAME_AND_LOGO]
        newName:
          type: string
        newLogoUrl:
          type: string
          format: uri
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        rejectionReason:
          type: string
        createdAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time

    VenueChangeRequestAdmin:
      allOf:
        - $ref: '#/components/schemas/VenueChangeRequest'
        - type: object
          properties:
            venue:
              $ref: '#/components/schemas/VenueListItem'
            requestedBy:
              $ref: '#/components/schemas/User'

    OwnerInvitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        venue:
          $ref: '#/components/schemas/VenueListItem'
        status:
          type: string
          enum: [PENDING, ACCEPTED, EXPIRED]
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        acceptedAt:
          type: string
          format: date-time

    OfferListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        discountType:
          type: string
          enum: [PERCENTAGE, FIXED_AMOUNT, FREE_ITEM]
        discountValue:
          type: number
          description: Wartość rabatu (null dla FREE_ITEM)
        freeItemName:
          type: string
          description: Nazwa darmowego produktu (tylko dla FREE_ITEM)
        validFrom:
          type: string
          format: date
        validTo:
          type: string
          format: date
        venue:
          $ref: '#/components/schemas/VenueListItem'

    Offer:
      allOf:
        - $ref: '#/components/schemas/OfferListItem'
        - type: object
          properties:
            description:
              type: string
            qrValidityMinutes:
              type: integer
              description: Czas ważności QR w minutach (null = do końca oferty)

    OfferOwnerView:
      allOf:
        - $ref: '#/components/schemas/Offer'
        - type: object
          properties:
            status:
              type: string
              enum: [DRAFT, PENDING_REVIEW, SCHEDULED, ACTIVE, PAUSED, EXPIRED, REJECTED]
            scheduledPublishAt:
              type: string
              format: date-time
              description: Kiedy oferta zostanie aktywowana (dla SCHEDULED)
            rejectionReason:
              type: string
              description: Powód odrzucenia (dla REJECTED)
            redemptionsCount:
              type: integer
            redemptionsToday:
              type: integer
            createdAt:
              type: string
              format: date-time

    OfferModeration:
      allOf:
        - $ref: '#/components/schemas/OfferOwnerView'
        - type: object
          properties:
            moderationScore:
              type: number
              format: double
              description: Wynik AI (0-1)
            moderationFlags:
              type: array
              items:
                type: string
              description: Flagi z moderacji (np. ["profanity"])
            createdBy:
              $ref: '#/components/schemas/User'

    OfferCreate:
      type: object
      required: [title, discountType, validFrom, validTo]
      properties:
        title:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        discountType:
          type: string
          enum: [PERCENTAGE, FIXED_AMOUNT, FREE_ITEM]
        discountValue:
          type: number
          description: Wymagane dla PERCENTAGE i FIXED_AMOUNT
        freeItemName:
          type: string
          maxLength: 100
          description: Wymagane dla FREE_ITEM
        validFrom:
          type: string
          format: date
        validTo:
          type: string
          format: date
        qrValidityMinutes:
          type: integer
          enum: [5, 10, 15, 30, 60]
          default: 15
          description: Czas ważności QR (null = do końca oferty)

    Redemption:
      type: object
      properties:
        id:
          type: string
          format: uuid
        qrCode:
          type: string
          example: "RDM-A7X2K9"
        status:
          type: string
          enum: [PENDING, REDEEMED, EXPIRED]
        qrGeneratedAt:
          type: string
          format: date-time
        qrExpiresAt:
          type: string
          format: date-time
          description: Kiedy QR wygasa
        redeemedAt:
          type: string
          format: date-time
        offer:
          $ref: '#/components/schemas/OfferListItem'
        review:
          $ref: '#/components/schemas/OfferReview'
          description: Ocena (jeśli dodano)

    RedemptionValidation:
      type: object
      description: Dane wyświetlane pracownikowi po zeskanowaniu QR
      properties:
        qrCode:
          type: string
        status:
          type: string
          enum: [PENDING, REDEEMED, EXPIRED]
        qrExpiresAt:
          type: string
          format: date-time
        timeRemainingSeconds:
          type: integer
          description: Ile sekund do wygaśnięcia QR
        customerName:
          type: string
          description: Imię klienta (nie pełne dane)
        offer:
          type: object
          properties:
            title:
              type: string
            discountType:
              type: string
            discountValue:
              type: number
            freeItemName:
              type: string
        venueName:
          type: string
        redeemedAt:
          type: string
          format: date-time
          description: Jeśli już zrealizowano

    OfferReview:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        createdAt:
          type: string
          format: date-time

    PushSettings:
      type: object
      properties:
        pushEnabled:
          type: boolean
          description: Master switch dla wszystkich push
        digestTime:
          type: string
          example: "10:00"
          description: Godzina wysyłki digestu (HH:mm)
        tokensCount:
          type: integer
          description: Liczba zarejestrowanych urządzeń
