  /owner/venues/{venueId}/change-request:
    post:
      tags: [Owner]
      summary: Złóż wniosek o zmianę nazwy/logo (tylko OWNER)
      description: Zmiana nazwy lub logo wymaga akceptacji admina
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
