            application/json:
              schema:
                type: object
                properties:
                  activeOffers:
                    type: integer
                  redemptionsToday:
                    type: integer
                  redemptionsWeek:
                    type: integer
                  redemptionsTotal:
                    type: integer
                  averageRating:
                    type: number
                    format: double
                    description: Średnia ocen (tylko dla właściciela, nie publiczna)
                  totalReviews:
                    type: integer

  /owner/venues/{venueId}/managers:
    get:
      tags: [Owner]
      summary: Lista managerów lokalu (tylko OWNER)
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista managerów
