        '403':
          description: Tylko OWNER może zapraszać managerów
        '409':
          description: Użytkownik jest już przypisany do lokalu

  /owner/venues/{venueId}/managers/{userId}:
    delete:
      tags: [Owner]
      summary: Usuń managera (tylko OWNER)
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Manager usunięty
        '403':
          description: Tylko OWNER może usuwać managerów

  /owner/venues/{venueId}/offers:
    get:
      tags: [Owner]
      summary: Oferty lokalu
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PENDING_REVIEW, SCHEDULED, ACTIVE, PAUSED, EXPIRED, REJECTED]
      responses:
        '200':
          description: Lista ofert
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OfferOwnerView'

    post:
      tags: [Owner]
      summary: Utwórz ofertę
      description: |
        Nowa oferta przechodzi moderację i jest publikowana za minimum 3 dni.
        Status flow: DRAFT → PENDING_REVIEW → SCHEDULED → ACTIVE
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferCreate'
      responses:
        '201':
          description: Oferta utworzona (w moderacji)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferOwnerView'
        '400':
          description: Błąd walidacji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                dailyOfferLimit:
                  summary: Limit ofert
                  value:
                    error: "DAILY_OFFER_LIMIT"
                    message: "Możesz mieć tylko 1 aktywną ofertę dziennie (plan darmowy)"
                contentRejected:
                  summary: Treść odrzucona
                  value:
                    error: "CONTENT_REJECTED"
                    message: "Treść oferty zawiera niedozwolone wyrażenia"
                venueTerminating:
                  summary: Lokal w wypowiedzeniu
                  value:
                    error: "VENUE_TERMINATING"
                    message: "Nie można tworzyć nowych ofert w okresie wypowiedzenia"

  /owner/venues/{venueId}/offers/{offerId}:
    get:
      tags: [Owner]
      summary: Szczegóły oferty
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Oferta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferOwnerView'

    patch:
      tags: [Owner]
      summary: Aktualizuj ofertę (tylko DRAFT lub REJECTED)
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferCreate'
      responses:
        '200':
          description: Zaktualizowano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferOwnerView'
        '400':
          description: Nie można edytować oferty w tym statusie

    delete:
      tags: [Owner]
      summary: Usuń ofertę (tylko DRAFT)
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Usunięto

  /owner/venues/{venueId}/offers/{offerId}/submit:
    post:
      tags: [Owner]
      summary: Wyślij ofertę do moderacji (DRAFT → PENDING_REVIEW)
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Wysłano do moderacji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferOwnerView'

  /owner/venues/{venueId}/offers/{offerId}/pause:
    post:
      tags: [Owner]
      summary: Wstrzymaj ofertę (ACTIVE → PAUSED)
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Wstrzymano

  /owner/venues/{venueId}/offers/{offerId}/resume:
    post:
      tags: [Owner]
      summary: Wznów ofertę (PAUSED → ACTIVE)
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Wznowiono

