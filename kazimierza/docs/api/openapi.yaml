    delete:
      tags: [User]
      summary: Usuń token push (wylogowanie z urządzenia)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '204':
          description: Token usunięty

  /user/push-settings:
    get:
      tags: [User]
      summary: Pobierz ustawienia push
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Ustawienia push
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushSettings'

    patch:
      tags: [User]
      summary: Aktualizuj ustawienia push
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pushEnabled:
                  type: boolean
                digestTime:
                  type: string
                  pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
                  example: "10:00"
      responses:
        '200':
          description: Zaktualizowano
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushSettings'

