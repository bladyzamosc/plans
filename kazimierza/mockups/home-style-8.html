<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Styl 8: Editorial</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #0D0D0D;
            --white: #FFFFFF;
            --red: #DC2626;
            --gray: #737373;
            --light: #FAFAFA;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .phone {
            width: 375px;
            height: 812px;
            background: var(--white);
            border-radius: 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 24px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
        }

        .header-action {
            width: 40px;
            height: 40px;
            background: var(--light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-action svg {
            width: 18px;
            height: 18px;
            stroke: var(--black);
            stroke-width: 2;
            fill: none;
        }

        .header-title {
            font-family: 'DM Serif Display', serif;
            font-size: 42px;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--gray);
        }

        .header-subtitle span {
            color: var(--red);
            font-weight: 600;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px;
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .filter {
            padding: 8px 16px;
            border: 1px solid var(--black);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            color: var(--black);
        }

        .filter.active {
            background: var(--black);
            color: var(--white);
        }

        .offer-card {
            display: block;
            margin-bottom: 24px;
            text-decoration: none;
            color: inherit;
        }

        .offer-image {
            height: 160px;
            background: linear-gradient(135deg, var(--light) 0%, #E5E5E5 100%);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Serif Display', serif;
            font-size: 48px;
            color: var(--gray);
        }

        .offer-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .offer-venue {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
        }

        .offer-favorite svg {
            width: 24px;
            height: 24px;
            stroke: var(--gray);
            stroke-width: 1.5;
            fill: none;
        }

        .offer-favorite.active svg {
            stroke: var(--red);
            fill: var(--red);
        }

        .offer-title {
            font-size: 15px;
            color: var(--gray);
            margin-bottom: 8px;
        }

        .offer-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .offer-discount {
            font-weight: 600;
            color: var(--red);
            font-size: 14px;
        }

        .offer-expires {
            font-size: 12px;
            color: var(--gray);
        }

        .divider {
            height: 1px;
            background: var(--black);
            margin: 24px 0;
        }

        .tab-bar {
            display: flex;
            border-top: 1px solid var(--light);
            padding: 16px 24px 32px;
            gap: 8px;
        }

        .tab-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: var(--gray);
            font-size: 12px;
            font-weight: 500;
            padding: 12px;
        }

        .tab-item.active {
            color: var(--black);
            background: var(--light);
        }

        .tab-item svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .style-label {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--black);
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            font-family: 'DM Serif Display', serif;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Wszystkie mockupy</a>
    <span class="style-label">8. Editorial</span>

    <div class="phone">
        <div class="header">
            <div class="header-top">
                <span class="header-logo">S.</span>
                <span class="header-action">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                </span>
            </div>
            <h1 class="header-title">Jana<br>Kazimierza</h1>
            <p class="header-subtitle"><span>12</span> ofert od lokalnych</p>
        </div>

        <div class="content">
            <div class="filters">
                <a href="#" class="filter active">Wszystkie</a>
                <a href="#" class="filter">Jedzenie</a>
                <a href="#" class="filter">Kawiarnie</a>
                <a href="#" class="filter">Usługi</a>
            </div>

            <a href="#" class="offer-card">
                <div class="offer-image">B</div>
                <div class="offer-meta">
                    <h3 class="offer-venue">Burger u Kazika</h3>
                    <span class="offer-favorite">
                        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    </span>
                </div>
                <p class="offer-title">Na wszystkie pizze z menu</p>
                <div class="offer-footer">
                    <span class="offer-discount">-30%</span>
                    <span class="offer-expires">Kończy się za 2 dni</span>
                </div>
            </a>

            <div class="divider"></div>

            <a href="#" class="offer-card">
                <div class="offer-image">K</div>
                <div class="offer-meta">
                    <h3 class="offer-venue">Kawiarnia Cicha</h3>
                    <span class="offer-favorite">
                        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    </span>
                </div>
                <p class="offer-title">Kawa gratis do każdego tortu</p>
                <div class="offer-footer">
                    <span class="offer-discount">Gratis</span>
                    <span class="offer-expires">Kończy się za 5 dni</span>
                </div>
            </a>
        </div>

        <div class="tab-bar">
            <a href="#" class="tab-item active">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </a>
            <a href="#" class="tab-item">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </a>
            <a href="#" class="tab-item">
                <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </a>
            <a href="#" class="tab-item">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            </a>
        </div>
    </div>
</body>
</html>
