<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowa oferta - Swoi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <a href="owner-dashboard.html" class="header-back">←</a>
            <span class="header-title">Nowa oferta</span>
            <span style="width:40px"></span>
        </div>

        <div class="content">
            <div class="input-group">
                <label class="input-label">Tytuł</label>
                <input type="text" class="input" placeholder="-30% na pizzę">
            </div>

            <div class="input-group">
                <label class="input-label">Opis</label>
                <textarea class="input" rows="3" placeholder="Na wszystkie pizze z menu..."></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">Typ rabatu</label>
                <div class="radio-group">
                    <label class="radio-item selected">
                        <span class="radio-circle"></span>
                        <span>Procent <span class="text-muted">-X%</span></span>
                    </label>
                    <label class="radio-item">
                        <span class="radio-circle"></span>
                        <span>Kwota <span class="text-muted">-X zł</span></span>
                    </label>
                    <label class="radio-item">
                        <span class="radio-circle"></span>
                        <span>Gratis <span class="text-muted">produkt</span></span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Wartość</label>
                <input type="number" class="input" placeholder="30" style="width:120px">
                <span class="text-muted" style="margin-left:8px">%</span>
            </div>

            <div class="input-group">
                <label class="input-label">Okres</label>
                <div class="btn-row">
                    <input type="date" class="input">
                    <input type="date" class="input">
                </div>
            </div>

            <div class="btn-row mt-20">
                <a href="owner-offers.html" class="btn btn-secondary">Zapisz szkic</a>
                <a href="owner-offers.html" class="btn btn-primary">Publikuj</a>
            </div>
        </div>
    </div>
</body>
</html>
