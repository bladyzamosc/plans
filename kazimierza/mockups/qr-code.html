<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kod QR - Tuswoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F2F5F9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .back-to-index {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #fff;
            padding: 8px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #1E3A5F;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .back-to-index:hover {
            background: #F2F5F9;
        }

        .phone {
            width: 375px;
            height: 812px;
            background: #F2F5F9;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(30,58,95,0.15);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #fff;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            min-height: 56px;
        }

        .header-back {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #1E3A5F;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 300;
        }

        .header-back:hover {
            background: #F2F5F9;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #1E3A5F;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .venue-name {
            font-size: 20px;
            font-weight: 600;
            color: #1E3A5F;
        }

        .offer-title {
            font-size: 15px;
            color: #6B7C93;
            margin-top: 4px;
        }

        .qr-timer {
            margin: 24px 0;
        }

        .timer-circle {
            width: 110px;
            height: 110px;
            border: 4px solid transparent;
            background: linear-gradient(#F2F5F9, #F2F5F9) padding-box,
                        linear-gradient(135deg, #1E3A5F, #2C5282) border-box;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .timer-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Inter', monospace;
            color: #1E3A5F;
        }

        .timer-label {
            font-size: 11px;
            color: #6B7C93;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .qr-container {
            background: #fff;
            border-radius: 24px;
            padding: 28px;
            margin: 16px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .qr-code {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #F2F5F9, #E8EDF4);
            border-radius: 16px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-size: 12px;
            color: #1E3A5F;
            line-height: 1.4;
        }

        .qr-text {
            font-family: 'Inter', monospace;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 3px;
            margin-top: 20px;
            color: #1E3A5F;
        }

        .info-card {
            background: #E8EDF4;
            border-radius: 16px;
            padding: 14px 20px;
            margin-top: 8px;
        }

        .info-text {
            font-size: 14px;
            color: #2C5282;
            font-weight: 500;
        }

        .hint-text {
            font-size: 13px;
            color: #6B7C93;
            margin-top: 16px;
        }

        .mt-20 { margin-top: 20px; }
        .mt-12 { margin-top: 12px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-index">Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <a href="offer-details.html" class="header-back">&#10005;</a>
            <span class="header-title"></span>
            <span style="width:40px"></span>
        </div>

        <div class="content">
            <h2 class="venue-name">Burger u Kazika</h2>
            <p class="offer-title">-30% na pizze</p>

            <div class="qr-timer mt-20">
                <div class="timer-circle">
                    <span class="timer-value">14:32</span>
                    <span class="timer-label">pozostalo</span>
                </div>
            </div>

            <div class="qr-container">
                <div class="qr-code">
                    &#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;<br>
                    &#9608; &#9604;&#9604;&#9604;&#9604;&#9604; &#9608;&#9604;&#9608; &#9604; &#9608;<br>
                    &#9608; &#9608;   &#9608; &#9608;&#9604;&#9604;&#9600;&#9604;&#9604;&#9608;<br>
                    &#9608; &#9608;&#9604;&#9604;&#9604;&#9608; &#9608; &#9604; &#9600;&#9604;&#9608;<br>
                    &#9608;&#9604;&#9604;&#9604;&#9604;&#9604;&#9604;&#9604;&#9608;&#9604;&#9608;&#9604;&#9608;&#9604;&#9608;<br>
                    &#9608; &#9604; &#9608;&#9604;&#9600;&#9604;&#9604;&#9600;&#9608;&#9604; &#9604;&#9608;<br>
                    &#9608;&#9604;&#9604;&#9604;&#9608; &#9608; &#9600;  &#9600;&#9608;&#9608;&#9604;&#9608;<br>
                    &#9600;&#9600;&#9600;&#9600;&#9600;&#9600;&#9600;&#9600;&#9600;&#9600;&#9600;&#9600;&#9600;&#9600;&#9600;
                </div>
                <p class="qr-text">RDM-A7X2K9</p>
            </div>

            <div class="info-card">
                <p class="info-text">Pokaz ten kod pracownikowi</p>
            </div>

            <p class="hint-text">Kod wygasa po uplywie czasu</p>
        </div>
    </div>
</body>
</html>
