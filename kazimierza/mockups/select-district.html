<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wybor dzielnicy - Tuswoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #E8EDF4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .back-to-index {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #1E3A5F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .back-to-index:hover {
            text-decoration: underline;
        }
        .phone {
            width: 375px;
            height: 812px;
            background: #F2F5F9;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(30, 58, 95, 0.15);
            position: relative;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #fff;
            border-bottom: 1px solid #E8EDF4;
        }
        .header-text {
            color: #2C5282;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
        }
        .header-text:hover {
            color: #1E3A5F;
        }
        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #1E3A5F;
        }
        .content {
            padding: 24px;
            overflow-y: auto;
            height: calc(100% - 73px);
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1E3A5F;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper::before {
            content: attr(data-icon);
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }
        .input {
            width: 100%;
            padding: 16px 16px 16px 44px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            border: 1.5px solid #E8EDF4;
            border-radius: 14px;
            background: #fff;
            color: #1E3A5F;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .input:focus {
            outline: none;
            border-color: #2C5282;
            box-shadow: 0 0 0 4px rgba(44, 82, 130, 0.1);
        }
        .input::placeholder {
            color: #6B7C93;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }
        .btn-secondary {
            background: #fff;
            color: #1E3A5F;
            border: 1.5px solid #E8EDF4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .btn-secondary:hover {
            border-color: #2C5282;
            box-shadow: 0 4px 12px rgba(30, 58, 95, 0.1);
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #6B7C93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .card {
            display: block;
            background: #fff;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 12px;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
            border: 1.5px solid transparent;
        }
        .card:hover {
            border-color: #2C5282;
            box-shadow: 0 4px 16px rgba(30, 58, 95, 0.1);
            transform: translateY(-1px);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1E3A5F;
            margin-bottom: 4px;
        }
        .card-desc {
            font-size: 14px;
            color: #6B7C93;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <span style="width:40px"></span>
            <span class="header-title"></span>
            <a href="home.html" class="header-text">Pomin</a>
        </div>

        <div class="content">
            <h1 class="title">Wybierz swoja okolice</h1>

            <div class="input-group">
                <div class="input-wrapper" data-icon="&#128269;">
                    <input type="text" class="input" placeholder="Szukaj dzielnicy...">
                </div>
            </div>

            <a href="home.html" class="btn btn-secondary">
                <span>&#9678;</span>
                Uzyj mojej lokalizacji
            </a>

            <p class="section-title">Popularne</p>

            <a href="select-street.html" class="card">
                <div class="card-title">Jana Kazimierza</div>
                <div class="card-desc">Wola, Warszawa</div>
            </a>

            <a href="select-street.html" class="card">
                <div class="card-title">Mokotow Stary</div>
                <div class="card-desc">Mokotow, Warszawa</div>
            </a>

            <a href="select-street.html" class="card">
                <div class="card-title">Zoliborz</div>
                <div class="card-desc">Zoliborz, Warszawa</div>
            </a>
        </div>
    </div>
</body>
</html>
