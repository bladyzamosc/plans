<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel właściciela - Swoi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <button class="header-action">☰</button>
            <span class="header-title">Panel właściciela</span>
            <span style="width:40px"></span>
        </div>

        <div class="content">
            <h2 style="font-size:20px">Burger u Kazika</h2>
            <p class="text-muted text-small">ul. Kazimierza 42</p>

            <div class="divider"></div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">3</div>
                    <div class="stat-label">aktywne oferty</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">12</div>
                    <div class="stat-label">realizacje dziś</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">47</div>
                    <div class="stat-label">tydzień</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">156</div>
                    <div class="stat-label">ogółem</div>
                </div>
            </div>

            <a href="owner-new-offer.html" class="btn btn-primary">+ Nowa oferta</a>

            <div class="divider"></div>

            <a href="owner-offers.html" class="list-item">
                <span class="list-icon">📋</span>
                <span class="list-text">Moje oferty</span>
                <span class="list-arrow">→</span>
            </a>
            <a href="owner-settings.html" class="list-item">
                <span class="list-icon">⚙️</span>
                <span class="list-text">Ustawienia lokalu</span>
                <span class="list-arrow">→</span>
            </a>
        </div>
    </div>
</body>
</html>
