<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limit dzienny - Tuswoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F2F5F9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .back-to-index {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #fff;
            padding: 8px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #1E3A5F;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .back-to-index:hover {
            background: #F2F5F9;
        }

        .phone {
            width: 375px;
            height: 812px;
            background: #F2F5F9;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(30,58,95,0.15);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #fff;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            min-height: 56px;
        }

        .header-back {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1E3A5F;
            text-decoration: none;
            border-radius: 12px;
        }

        .header-back:hover {
            background: #F2F5F9;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            margin-bottom: 24px;
        }

        .icon-circle.warning {
            background: #FFF4E5;
            color: #E65100;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1E3A5F;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 16px;
            color: #6B7C93;
            margin-top: 16px;
            line-height: 1.5;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 280px;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #1E3A5F, #2C5282);
            color: #fff;
            margin-top: 40px;
            box-shadow: 0 4px 16px rgba(30,58,95,0.25);
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30,58,95,0.35);
        }

        .mt-16 { margin-top: 16px; }
        .mt-32 { margin-top: 32px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-index">Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <a href="offer-details.html" class="header-back">&#8592;</a>
            <span style="width:40px"></span>
            <span style="width:40px"></span>
        </div>

        <div class="content">
            <div class="icon-circle warning">&#9200;</div>
            <h1 class="title">Juz dzis skorzystales<br>z tej oferty</h1>

            <p class="subtitle">
                Wroc jutro po kolejny<br>rabat w tym lokalu.
            </p>

            <a href="home.html" class="btn-primary">Przegladaj inne</a>
        </div>
    </div>
</body>
</html>
