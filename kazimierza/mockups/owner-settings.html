<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustawienia lokalu - Swoi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <a href="owner-dashboard.html" class="header-back">←</a>
            <span class="header-title">Ustawienia</span>
            <span style="width:40px"></span>

        <div class="content">
            <div class="text-center mb-20">
                <div class="logo" style="margin:0 auto">B</div>
                <a href="#" class="text-link text-small mt-8" style="display:block">Zmień logo</a>
            </div>

            <div class="input-group">
                <label class="input-label">Nazwa</label>
                <input type="text" class="input" value="Burger u Kazika">

            <div class="input-group">
                <label class="input-label">Adres</label>
                <input type="text" class="input" value="ul. Kazimierza 42">

            <div class="input-group">
                <label class="input-label">Opis</label>
                <textarea class="input" rows="3">Najlepsze burgery na Woli! Od 2015 roku.</textarea>
            </div>

            <div class="input-group">
                <label class="input-label">PIN walidacji</label>
                <div class="card-row">
                    <input type="password" class="input" value="1234" style="flex:1">
                    <a href="#" class="btn btn-secondary" style="width:auto;padding:14px 20px">Zmień</a>
                </div>
            </div>

            <a href="owner-dashboard.html" class="btn btn-primary mt-20">Zapisz</a>
