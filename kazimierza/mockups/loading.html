<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladowanie - Tuswoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F2F5F9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .back-to-index {
            position: fixed;
            top: 16px;
            left: 16px;
            color: #1E3A5F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
        }

        .back-to-index:hover {
            text-decoration: underline;
        }

        .phone {
            width: 375px;
            height: 812px;
            background: #F2F5F9;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(30, 58, 95, 0.15);
            position: relative;
            border: 8px solid #1E3A5F;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .spinner-container {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 32px rgba(30, 58, 95, 0.12);
            margin-bottom: 28px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(30, 58, 95, 0.1);
            border-top-color: #1E3A5F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .text-muted {
            color: #6B7C93;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #2C5282;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="content">
            <div class="spinner-container">
                <div class="spinner"></div>
            </div>
            <p class="text-muted">
                Ladowanie
                <span class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </p>
        </div>
    </div>
</body>
</html>
