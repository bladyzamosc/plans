<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brak ofert - Tuswoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F2F5F9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .back-to-index {
            position: fixed;
            top: 16px;
            left: 16px;
            color: #1E3A5F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
        }

        .back-to-index:hover {
            text-decoration: underline;
        }

        .phone {
            width: 375px;
            height: 812px;
            background: #F2F5F9;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(30, 58, 95, 0.15);
            position: relative;
            border: 8px solid #1E3A5F;
        }

        .header {
            background: linear-gradient(135deg, #1E3A5F, #2C5282);
            padding: 60px 20px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-action {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.2s;
        }

        .header-action:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .header-title {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .content {
            padding: 20px;
            height: calc(100% - 160px);
            overflow-y: auto;
        }

        .district-selector {
            background: #fff;
            border-radius: 20px;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #1E3A5F;
            box-shadow: 0 4px 12px rgba(30, 58, 95, 0.08);
            text-align: center;
            margin-bottom: 16px;
        }

        .chips {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .chip {
            flex-shrink: 0;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            color: #6B7C93;
            background: #fff;
            border: 1px solid rgba(30, 58, 95, 0.1);
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: #2C5282;
            color: #2C5282;
        }

        .chip.active {
            background: linear-gradient(135deg, #1E3A5F, #2C5282);
            color: #fff;
            border-color: transparent;
        }

        .content-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 60px;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 8px 24px rgba(30, 58, 95, 0.1);
            margin-bottom: 24px;
        }

        .icon-circle.info {
            border: 3px solid #2C5282;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1E3A5F;
            margin-bottom: 8px;
        }

        .text-muted {
            color: #6B7C93;
            font-size: 15px;
            line-height: 1.5;
        }

        .btn-secondary {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 28px;
            background: #fff;
            color: #1E3A5F;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            text-decoration: none;
            border: 2px solid #1E3A5F;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #1E3A5F, #2C5282);
            color: #fff;
            border-color: transparent;
        }

        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            display: flex;
            padding: 12px 0 28px;
            border-top: 1px solid rgba(30, 58, 95, 0.08);
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #6B7C93;
            font-size: 11px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .tab-item:hover {
            color: #2C5282;
        }

        .tab-item.active {
            color: #1E3A5F;
        }

        .tab-icon {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <button class="header-action">☰</button>
            <span class="header-title">Tuswoi</span>
            <a href="profile.html" class="header-action">○</a>
        </div>

        <div class="content">
            <div class="district-selector">Jana Kazimierza</div>

            <div class="chips">
                <a href="#" class="chip active">Wszystkie</a>
                <a href="#" class="chip">Jedzenie</a>
                <a href="#" class="chip">Kawa</a>
                <a href="#" class="chip">Uslugi</a>
            </div>

            <div class="content-center">
                <div class="icon-circle info">🏪</div>
                <h2>Brak ofert w tej okolicy</h2>
                <p class="text-muted">
                    Sprawdz pozniej lub<br>dodaj inna dzielnice
                </p>
                <a href="select-district.html" class="btn-secondary">+ Dodaj dzielnice</a>
            </div>
        </div>

        <div class="tab-bar">
            <a href="home.html" class="tab-item active">
                <span class="tab-icon">🏠</span>
                Home
            </a>
            <a href="#" class="tab-item">
                <span class="tab-icon">🔍</span>
                Szukaj
            </a>
            <a href="favorites.html" class="tab-item">
                <span class="tab-icon">♥</span>
                Ulub.
            </a>
            <a href="profile.html" class="tab-item">
                <span class="tab-icon">👤</span>
                Profil
            </a>
        </div>
    </div>
</body>
</html>
