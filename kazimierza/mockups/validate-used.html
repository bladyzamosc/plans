<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kod uzyty - Tuswoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F2F5F9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .back-to-index {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #1E3A5F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .back-to-index:hover {
            text-decoration: underline;
        }
        .phone {
            width: 375px;
            min-height: 700px;
            background: #F2F5F9;
            border-radius: 40px;
            border: 8px solid #1E3A5F;
            overflow: hidden;
            position: relative;
        }
        .content {
            padding: 100px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .icon-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .icon-circle.error {
            background: linear-gradient(135deg, #FF3B30, #E63329);
            color: #fff;
            box-shadow: 0 8px 24px rgba(255, 59, 48, 0.3);
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1E3A5F;
            margin-bottom: 16px;
        }
        .text-muted {
            color: #6B7C93;
            font-size: 15px;
            line-height: 1.5;
        }
        .text-muted strong {
            color: #1E3A5F;
            font-weight: 600;
        }
        .info-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            padding: 20px 24px;
            margin-top: 32px;
            width: 100%;
        }
        .info-card p {
            margin: 0;
            color: #6B7C93;
            font-size: 14px;
        }
        .info-card .date {
            font-size: 18px;
            font-weight: 600;
            color: #1E3A5F;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="content">
            <div class="icon-circle error">&#10005;</div>
            <h1 class="title">Kod juz wykorzystany</h1>

            <p class="text-muted">
                Ten rabat zostal juz zrealizowany.
            </p>

            <div class="info-card">
                <p>Data realizacji</p>
                <p class="date">18.07.2026 o 12:15</p>
            </div>
        </div>
    </div>
</body>
</html>
