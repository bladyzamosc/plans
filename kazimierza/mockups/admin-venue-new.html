<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowy lokal - Swoi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <a href="admin-venues.html" class="header-back">←</a>
            <span class="header-title">Nowy lokal</span>
            <span style="width:40px"></span>
        </div>

        <div class="content">
            <div class="input-group">
                <label class="input-label">Nazwa</label>
                <input type="text" class="input" placeholder="Burger u Kazika">
            </div>

            <div class="input-group">
                <label class="input-label">Dzielnica</label>
                <select class="input">
                    <option>Wybierz...</option>
                    <option>Jana Kazimierza</option>
                    <option>Mokotów Stary</option>
                    <option>Żoliborz</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">Kategoria</label>
                <select class="input">
                    <option>Wybierz...</option>
                    <option>Restauracja</option>
                    <option>Kawiarnia</option>
                    <option>Piekarnia</option>
                    <option>Fryzjer</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">Adres</label>
                <input type="text" class="input" placeholder="ul. Kazimierza 42">
            </div>

            <div class="input-group">
                <label class="input-label">Właściciel</label>
                <input type="text" class="input" placeholder="🔍 Szukaj użytkownika...">
            </div>

            <div class="input-group">
                <label class="input-label">PIN (4 cyfry)</label>
                <div class="card-row">
                    <input type="text" class="input" placeholder="4521" style="flex:1">
                    <a href="#" class="btn btn-secondary" style="width:auto;padding:14px 20px">Generuj</a>
                </div>
            </div>

            <a href="admin-venues.html" class="btn btn-primary mt-8">Zapisz</a>
        </div>
    </div>
</body>
</html>
