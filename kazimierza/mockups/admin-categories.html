<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorie - Swoi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <a href="admin-dashboard.html" class="header-back">←</a>
            <span class="header-title">Kategorie</span>
            <button class="header-action">+</button>
        </div>

        <div class="content">
            <p class="text-muted text-small mb-12">Przeciągnij by zmienić kolejność</p>

            <div class="card">
                <div class="card-row">
                    <span style="color:#ccc;cursor:grab">≡</span>
                    <span>🍕</span>
                    <span class="card-body">Restauracja</span>
                    <span class="text-muted">[3]</span>
                </div>
            </div>

            <div class="card">
                <div class="card-row">
                    <span style="color:#ccc;cursor:grab">≡</span>
                    <span>☕</span>
                    <span class="card-body">Kawiarnia</span>
                    <span class="text-muted">[2]</span>
                </div>
            </div>

            <div class="card">
                <div class="card-row">
                    <span style="color:#ccc;cursor:grab">≡</span>
                    <span>🍞</span>
                    <span class="card-body">Piekarnia</span>
                    <span class="text-muted">[2]</span>
                </div>
            </div>

            <div class="card">
                <div class="card-row">
                    <span style="color:#ccc;cursor:grab">≡</span>
                    <span>✂️</span>
                    <span class="card-body">Fryzjer</span>
                    <span class="text-muted">[1]</span>
                </div>
            </div>

            <div class="card">
                <div class="card-row">
                    <span style="color:#ccc;cursor:grab">≡</span>
                    <span>🍺</span>
                    <span class="card-body">Bar</span>
                    <span class="text-muted">[0]</span>
                </div>
            </div>

            <div class="card">
                <div class="card-row">
                    <span style="color:#ccc;cursor:grab">≡</span>
                    <span>💅</span>
                    <span class="card-body">Paznokcie</span>
                    <span class="text-muted">[0]</span>
                </div>
            </div>

            <p class="text-muted text-small mt-16">[n] = liczba lokali</p>
        </div>
    </div>
</body>
</html>
