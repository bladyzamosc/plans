<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szczegoly oferty - Tuswoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F2F5F9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .back-to-index {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #fff;
            padding: 8px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #1E3A5F;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .back-to-index:hover {
            background: #F2F5F9;
        }

        .phone {
            width: 375px;
            height: 812px;
            background: #F2F5F9;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(30,58,95,0.15);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #fff;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            min-height: 56px;
        }

        .header-back {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1E3A5F;
            text-decoration: none;
            border-radius: 12px;
        }

        .header-back:hover {
            background: #F2F5F9;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #1E3A5F;
        }

        .header-action {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1E3A5F;
            text-decoration: none;
            border-radius: 12px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .header-action:hover {
            background: #F2F5F9;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
        }

        .text-center {
            text-align: center;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1E3A5F, #2C5282);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto;
            box-shadow: 0 4px 16px rgba(30,58,95,0.2);
        }

        .venue-name {
            font-size: 22px;
            font-weight: 600;
            color: #1E3A5F;
            margin-top: 16px;
        }

        .venue-address {
            font-size: 14px;
            color: #6B7C93;
            margin-top: 4px;
        }

        .divider {
            height: 1px;
            background: #E8EDF4;
            margin: 24px 0;
        }

        .discount-badge {
            display: inline-block;
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #1E3A5F, #2C5282);
            padding: 16px 32px;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(30,58,95,0.25);
        }

        .offer-description {
            font-size: 18px;
            color: #2C5282;
            margin-top: 12px;
            font-weight: 500;
        }

        .validity-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            padding: 10px 16px;
            background: #E8EDF4;
            border-radius: 12px;
            font-size: 14px;
            color: #6B7C93;
            font-weight: 500;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .card-text {
            font-size: 14px;
            color: #6B7C93;
            line-height: 1.6;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #1E3A5F, #2C5282);
            color: #fff;
            margin-top: 32px;
            box-shadow: 0 4px 16px rgba(30,58,95,0.25);
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30,58,95,0.35);
        }

        .mt-8 { margin-top: 8px; }
        .mt-16 { margin-top: 16px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-index">Wszystkie mockupy</a>

    <div class="phone">
        <div class="header">
            <a href="home.html" class="header-back">&#8592;</a>
            <span class="header-title"></span>
            <button class="header-action">&#9825;</button>
        </div>

        <div class="content">
            <div class="text-center">
                <div class="logo">B</div>
                <h2 class="venue-name">Burger u Kazika</h2>
                <p class="venue-address">ul. Kazimierza 42</p>
            </div>

            <div class="divider"></div>

            <div class="text-center">
                <div class="discount-badge">-30%</div>
                <p class="offer-description">Na wszystkie pizze</p>
                <div class="validity-tag">
                    <span>&#128197;</span>
                    Wazne: 15.07 - 20.07.2026
                </div>
            </div>

            <div class="divider"></div>

            <div class="card">
                <p class="card-text">
                    Pizza neapolitanska wypiekana w piecu opalanym drewnem.
                    Nie laczy sie z innymi promocjami.
                </p>
            </div>

            <a href="qr-code.html" class="btn-primary">POKAZ KOD</a>
        </div>
    </div>
</body>
</html>
