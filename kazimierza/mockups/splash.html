<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash - Tuswoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #E8EDF4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .back-to-index {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #1E3A5F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .back-to-index:hover {
            text-decoration: underline;
        }
        .phone {
            width: 375px;
            height: 812px;
            background: #F2F5F9;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(30, 58, 95, 0.15);
            position: relative;
        }
        .content {
            padding: 60px 24px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1E3A5F, #2C5282);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(30, 58, 95, 0.3);
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            color: #1E3A5F;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 16px;
            color: #6B7C93;
            margin-bottom: 48px;
        }
        .btn-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-outline {
            background: #fff;
            color: #1E3A5F;
            border: 1.5px solid #E8EDF4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .btn-outline:hover {
            border-color: #2C5282;
            box-shadow: 0 4px 12px rgba(30, 58, 95, 0.1);
        }
        .btn-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }
        .text-link {
            margin-top: 32px;
            color: #2C5282;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }
        .text-link:hover {
            color: #1E3A5F;
        }
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #fff;
            border: 1.5px solid #E8EDF4;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #1E3A5F;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .lang-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 4px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            display: none;
            overflow: hidden;
            min-width: 120px;
        }
        .lang-switch:hover .lang-menu,
        .lang-switch:focus-within .lang-menu {
            display: block;
        }
        .lang-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            text-decoration: none;
            color: #1E3A5F;
            font-size: 14px;
            transition: background 0.15s;
        }
        .lang-option:hover {
            background: #F2F5F9;
        }
        .lang-option.active {
            background: #F2F5F9;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-index">← Wszystkie mockupy</a>

    <div class="phone">
        <div class="lang-switch">
            <button class="lang-btn">
                <svg width="20" height="14" viewBox="0 0 20 14"><rect width="20" height="7" fill="#fff"/><rect y="7" width="20" height="7" fill="#DC143C"/></svg>
                PL
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="lang-menu">
                <a href="#" class="lang-option active">
                    <svg width="20" height="14" viewBox="0 0 20 14"><rect width="20" height="7" fill="#fff"/><rect y="7" width="20" height="7" fill="#DC143C"/></svg>
                    Polski
                </a>
                <a href="#" class="lang-option">
                    <svg width="20" height="14" viewBox="0 0 20 14"><clipPath id="gb"><rect width="20" height="14" rx="1"/></clipPath><g clip-path="url(#gb)"><rect width="20" height="14" fill="#012169"/><path d="M0 0L20 14M20 0L0 14" stroke="#fff" stroke-width="2.5"/><path d="M0 0L20 14M20 0L0 14" stroke="#C8102E" stroke-width="1.5"/><path d="M10 0V14M0 7H20" stroke="#fff" stroke-width="4"/><path d="M10 0V14M0 7H20" stroke="#C8102E" stroke-width="2.5"/></g></svg>
                    English
                </a>
            </div>
        </div>
        <div class="content">
            <div class="logo">T</div>
            <h1 class="title">Tuswoi</h1>
            <p class="subtitle">Laczymy sie lokalnie!</p>

            <div class="btn-group">
                <a href="home.html" class="btn btn-outline">
                    <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Kontynuuj przez Google
                </a>
                <a href="home.html" class="btn btn-outline">
                    <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="#000">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                    </svg>
                    Kontynuuj przez Apple
                </a>
                <a href="login-email.html" class="btn btn-outline">
                    <span class="btn-icon">✉</span>
                    Kontynuuj przez Email
                </a>
            </div>

            <a href="home.html" class="text-link">Przegladaj bez konta →</a>
        </div>
    </div>
</body>
</html>
